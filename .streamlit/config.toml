# Motyw aplikacji — WYLACZNIE oficjalny theming Streamlita (bez hackow CSS).
#
# Zasada nadrzedna: czerwien i zielen sa ZAREZERWOWANE dla znaczenia
# (spadek / wzrost). Domyslny primaryColor Streamlita to czerwien #FF4B4B,
# przez co pasek "Wynik" swiecil na czerwono przy DOBRYM wyniku, a kafelki
# i przyciski konkurowaly z kolumnami "Do celu %" / "EPS vs konsensus".
# Dlatego chrome UI (przyciski, paski, focus, linki) dostaje osobny,
# nienacechowany akcent: jeden blekit, ten sam co seria "Przychody"
# na wykresach (charts/helpers.py) -> w calej aplikacji jest JEDEN blekit.
#
# TYLKO CIEMNY, celowo bez [theme.light]/[theme.dark]. Zweryfikowane w
# zrodle Streamlita (runtime/app_session.py, _populate_theme_msg): gdy oba
# warianty sa zdefiniowane, frontend ZAWSZE przelacza wg prefers-color-scheme
# przegladarki — "base" wtedy nie ma znaczenia (sprawdzone tez empirycznie:
# base="dark" + oba warianty = aplikacja i tak jasna przy jasnym systemie).
# "base" realnie dziala tylko jako fallback dla WLASNOSCI, ktorych nie
# ustawiono w [theme] — a to dziala rowniez przy jednym, wspolnym motywie.
# Wiec jedyny sposob na naprawde caly-czas-ciemna aplikacje (dla kazdego
# odwiedzajacego, niezaleznie od jego systemu) to jeden motyw, bez wariantu
# jasnego do przelaczenia.

[theme]
base = "dark"
primaryColor = "#5b8def"            # jasny blekit — kontrast na ciemnym tle
backgroundColor = "#0f1218"         # off-black, nigdy #000000
secondaryBackgroundColor = "#161a23"
textColor = "#e5e9f0"
borderColor = "#272d3a"
linkColor = "#5b8def"
dataframeHeaderBackgroundColor = "#161a23"
dataframeBorderColor = "#272d3a"    # hairline zamiast pudelek (gestosc 8/10)
greenColor = "#22c55e"              # znaczenie: wzrost
redColor = "#f87171"                # znaczenie: spadek
blueColor = "#5b8def"
font = "sans-serif"
headingFont = "sans-serif"
codeFont = "monospace"
baseFontSize = 15          # gestosc 8/10: ciasniej niz domyslne 16, wciaz czytelnie
baseRadius = "small"       # JEDEN system promieni w calej aplikacji...
buttonRadius = "small"     # ...wlacznie z przyciskami (bez pigulek obok kwadratow)
metricValueFontSize = "1.75rem"
showWidgetBorder = true    # brak kart -> to obramowania definiuja pola formularzy
showSidebarBorder = true

# Paleta wykresow (Plotly/Altair) tam, gdzie kolor nie jest podany wprost.
# Kolejnosc odpowiada charts/helpers.py, zeby wykresy i chrome mowily
# tym samym jezykiem kolorow.
chartCategoricalColors = [
  "#2f6fdb", "#16a34a", "#7c3aed", "#0d9488",
  "#ea580c", "#0891b2", "#be123c", "#64748b",
]

[theme.sidebar]
backgroundColor = "#0c0f15"         # panel sterowania odrozniony tintem, nie inna paleta
borderColor = "#272d3a"
